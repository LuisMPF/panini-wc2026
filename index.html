<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0f0f13"/>
<title>Panini WC2026</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f13;--bg2:#1a1a24;--bg3:#252535;
  --border:#2a2a3a;
  --accent:#00d4aa;--accent-dim:rgba(0,212,170,.15);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,.15);
  --foil:#a78bfa;--foil-dim:rgba(167,139,250,.15);
  --text:#e8e8f0;--muted:#8888aa;
  --danger:#ef4444;
  --nav-h:56px;--bottom-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
button{font-family:'Barlow',sans-serif;cursor:pointer;border:none;background:none}
input{font-family:'Barlow',sans-serif}
.hidden{display:none!important}
.top-nav{display:none;align-items:stretch;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;height:var(--nav-h)}
.nav-brand{display:flex;align-items:center;padding:0 20px;gap:8px;border-right:1px solid var(--border)}
.nav-brand-text{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:2px;background:linear-gradient(90deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;align-items:stretch;flex:1}
.nav-btn{padding:0 16px;font-size:12px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.nav-btn.active,.nav-btn:hover{color:var(--text);border-bottom-color:var(--accent)}
.nav-collection{margin-left:auto;display:flex;align-items:center;padding:0 16px;gap:8px;font-size:13px;color:var(--muted)}
.nav-collection strong{color:var(--accent)}
.switch-btn{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--muted);transition:all .2s}
.switch-btn:hover{border-color:var(--accent);color:var(--accent)}
.bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);height:var(--bottom-h);padding-bottom:env(safe-area-inset-bottom);z-index:100}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:color .2s}
.bnav-btn.active{color:var(--accent)}
.bnav-btn svg{width:22px;height:22px}
#app{padding-bottom:var(--bottom-h)}
.view{display:none;padding:16px;max-width:920px;margin:0 auto}
.view.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.section-title{font-family:'Anton',sans-serif;letter-spacing:2px;font-size:13px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.btn{padding:12px 20px;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:.5px;transition:all .2s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{opacity:.85}
.btn-ghost{border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;transition:all .2s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:7px 14px;font-size:12px}
.input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--muted)}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.form-error{font-size:12px;color:var(--danger);margin-top:2px}
.home-header{text-align:center;padding:28px 0 22px}
.home-emoji{font-size:52px;margin-bottom:8px}
.home-title{font-family:'Anton',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{color:var(--muted);font-size:13px;margin-top:4px}
.collection-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.collection-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.collection-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.col-icon{width:44px;height:44px;background:var(--accent-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.col-info{flex:1;min-width:0}
.col-name{font-weight:700;font-size:16px}
.col-progress{font-size:12px;color:var(--muted);margin-top:2px}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.col-arrow{color:var(--muted);font-size:22px;flex-shrink:0}
.create-form{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px}
.create-form-title{font-family:'Anton',sans-serif;font-size:16px;letter-spacing:1px;margin-bottom:14px}
.create-fields{display:flex;flex-direction:column;gap:12px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dash-title{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:2px}
.donut-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0 8px}
.donut-pct{font-family:'Anton',sans-serif;font-size:38px;color:var(--accent);margin-top:8px}
.donut-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.stat-card{background:var(--bg3);border-radius:10px;padding:14px;text-align:center}
.stat-value{font-family:'Anton',sans-serif;font-size:28px}
.stat-value.v-owned{color:var(--accent)}
.stat-value.v-missing{color:var(--muted)}
.stat-value.v-dupes{color:var(--amber)}
.stat-value.v-teams{color:var(--foil)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.group-section{display:flex;flex-direction:column;gap:10px}
.group-block{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px}
.group-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.teams-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.team-mini{background:var(--bg3);border-radius:8px;padding:8px 4px;text-align:center}
.team-mini-flag{font-size:18px}
.team-mini-name{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.team-mini-bar{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.team-mini-fill{height:100%;background:var(--accent);border-radius:2px}
.browser-tabs{display:flex;overflow-x:auto;gap:4px;padding-bottom:10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.browser-tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:7px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s;white-space:nowrap}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
.team-section{margin-bottom:8px}
.team-header{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s;user-select:none}
.team-header:hover{border-color:var(--accent)}
.team-header.expanded{border-bottom-left-radius:0;border-bottom-right-radius:0;border-color:var(--accent)}
.team-flag{font-size:24px}
.team-name{flex:1;font-weight:700;font-size:15px}
.team-count{font-size:12px;color:var(--muted)}
.team-count.complete{color:var(--accent);font-weight:700}
.team-chevron{color:var(--muted);transition:transform .2s;font-size:16px}
.team-header.expanded .team-chevron{transform:rotate(180deg)}
.sticker-grid{display:none;background:var(--bg2);border:1px solid var(--accent);border-top:none;border-radius:0 0 10px 10px;padding:8px;grid-template-columns:repeat(5,1fr);gap:3px}
.sticker-grid.visible{display:grid}
.sticker-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:var(--bg3);border:1px solid var(--border);position:relative;overflow:hidden;user-select:none;-webkit-user-select:none}
.sticker-cell:active{transform:scale(.92)}
.sticker-cell.owned{background:var(--accent-dim);border-color:var(--accent)}
.sticker-cell.has-dupes{border-color:var(--amber)}
.sticker-cell.owned.has-dupes{background:var(--accent-dim);border-color:var(--amber)}
.sticker-cell.foil:not(.owned){background:var(--foil-dim);border-color:var(--foil)}
.sticker-cell.owned.foil{background:rgba(167,139,250,.2);border-color:var(--foil)}
.sticker-num{font-size:8px;font-weight:700;color:var(--muted);line-height:1}
.sticker-icon{font-size:14px;line-height:1;margin-top:2px}
.dupe-badge{position:absolute;top:2px;right:2px;background:var(--amber);color:#000;border-radius:3px;font-size:7px;font-weight:700;padding:1px 3px;line-height:1}
.special-section{margin-bottom:14px}
.special-title{font-family:'Anton',sans-serif;font-size:13px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;padding-left:8px;border-left:3px solid var(--accent)}
.special-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px}
.stats-bar{display:flex;gap:8px;align-items:center;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;font-size:13px;flex-wrap:wrap}
.stats-count{font-family:'Anton',sans-serif;font-size:22px;color:var(--accent)}
.search-bar{margin-bottom:12px}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.list-group{margin-bottom:14px}
.list-group-header{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px solid var(--border);margin-bottom:7px}
.lg-flag{font-size:18px}
.lg-name{font-weight:700;font-size:14px}
.lg-count{margin-left:auto;font-size:12px;color:var(--muted)}
.list-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:5px}
.li-id{font-size:10px;font-weight:700;color:var(--muted);font-family:monospace;min-width:44px}
.li-name{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-foil{font-size:11px;color:var(--foil);flex-shrink:0}
.li-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:700;color:var(--muted);transition:all .2s;flex-shrink:0}
.li-btn:hover{border-color:var(--accent);color:var(--accent)}
.dupe-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.dupe-count{font-family:'Anton',sans-serif;font-size:18px;color:var(--amber);min-width:22px;text-align:center}
.dupe-btn{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.dupe-btn:hover{border-color:var(--amber);color:var(--amber)}
.empty-state{text-align:center;padding:48px 16px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:16px;font-weight:700}
.empty-sub{font-size:13px;margin-top:4px}
.export-btn{margin-left:auto;padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s;white-space:nowrap}
.export-btn:hover{border-color:var(--amber);color:var(--amber)}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:340px}
.modal-title{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:18px;word-break:break-word}
.modal-counter{display:flex;align-items:center;justify-content:center;gap:20px;margin:16px 0}
.counter-btn{width:48px;height:48px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .2s}
.counter-btn:hover{border-color:var(--amber);color:var(--amber)}
.counter-val{font-family:'Anton',sans-serif;font-size:44px;color:var(--amber);min-width:60px;text-align:center}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions button{flex:1}
#toast{position:fixed;bottom:calc(var(--bottom-h) + 10px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg2);border:1px solid var(--accent);border-radius:20px;padding:8px 20px;font-size:13px;font-weight:600;color:var(--accent);opacity:0;transition:all .3s;pointer-events:none;z-index:150;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;gap:10px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.sticker-cell.foil.owned::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 25%,rgba(167,139,250,.4) 50%,transparent 75%);background-size:200% 200%;animation:shimmer 2s ease-in-out infinite;pointer-events:none}
@media(min-width:768px){
  .top-nav{display:flex}
  .bottom-nav{display:none}
  #app{padding-bottom:0}
  #toast{bottom:16px}
  .sticker-grid,.special-grid{grid-template-columns:repeat(10,1fr)}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
  .view{padding:24px}
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand"><span style="font-size:20px">⚽</span><span class="nav-brand-text">PANINI WC2026</span></div>
  <div class="nav-links">
    <button class="nav-btn" id="nb-dashboard" onclick="navTo('dashboard')">Dashboard</button>
    <button class="nav-btn" id="nb-browser" onclick="navTo('browser')">Cromos</button>
    <button class="nav-btn" id="nb-missing" onclick="navTo('missing')">Em Falta</button>
    <button class="nav-btn" id="nb-duplicates" onclick="navTo('duplicates')">Repetidos</button>
  </div>
  <div class="nav-collection">Coleção: <strong id="nav-col-name">—</strong>
    <button class="switch-btn" onclick="switchCollection()">↩ Trocar</button>
  </div>
</nav>

<div id="app">
  <div id="view-home" class="view active">
    <div class="home-header">
      <div class="home-emoji">⚽</div>
      <div class="home-title">PANINI WC2026</div>
      <div class="home-sub">FIFA World Cup 2026™ — Coleção Oficial Panini</div>
    </div>
    <div id="collections-loading" class="loading"><div class="spinner"></div> A carregar...</div>
    <div id="collection-list" class="collection-list" style="display:none"></div>
    <div class="create-form">
      <div class="create-form-title">✚ Nova Coleção</div>
      <div class="create-fields">
        <div class="form-group"><label class="form-label">Nome</label><input class="input" id="inp-name" type="text" placeholder="Ex: Luís, Sobrinho João..."/></div>
        <div class="form-group"><label class="form-label">Password</label><input class="input" id="inp-pass" type="password" placeholder="Escolhe uma password"/></div>
        <div class="form-group"><label class="form-label">Confirmar password</label><input class="input" id="inp-pass2" type="password" placeholder="Repete a password"/></div>
        <div class="form-error hidden" id="create-error"></div>
        <button class="btn btn-primary" onclick="doCreateCollection()">Criar Coleção</button>
      </div>
    </div>
  </div>

  <div id="view-dashboard" class="view">
    <div class="dash-header">
      <div><div class="section-title">COLEÇÃO</div><div class="dash-title" id="dash-title">—</div></div>
      <button class="btn-ghost btn-sm" onclick="switchCollection()">↩ Trocar</button>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="donut-wrap">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--bg3)" stroke-width="12"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--accent)" stroke-width="12"
            stroke-dasharray="314 314" stroke-dashoffset="314" stroke-linecap="round"
            transform="rotate(-90 60 60)" id="donut-arc"/>
        </svg>
        <div class="donut-pct" id="donut-pct">0%</div>
        <div class="donut-label">Completo</div>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-value v-owned" id="stat-owned">0</div><div class="stat-label">Tenho</div></div>
        <div class="stat-card"><div class="stat-value v-missing" id="stat-missing">980</div><div class="stat-label">Em Falta</div></div>
        <div class="stat-card"><div class="stat-value v-dupes" id="stat-dupes">0</div><div class="stat-label">Repetidos</div></div>
        <div class="stat-card"><div class="stat-value v-teams" id="stat-teams">0/48</div><div class="stat-label">Equipas Completas</div></div>
      </div>
    </div>
    <div class="section-title">PROGRESSO POR GRUPO</div>
    <div class="group-section" id="group-section"></div>
  </div>

  <div id="view-browser" class="view">
    <div class="browser-tabs" id="browser-tabs"></div>
    <div id="browser-content"></div>
  </div>

  <div id="view-missing" class="view">
    <div class="stats-bar">
      <span>Em falta:</span><span class="stats-count" id="missing-count">—</span>
      <span style="color:var(--muted);font-size:12px">/ 980 cromos</span>
    </div>
    <div class="search-bar"><input class="search-input" id="missing-search" type="text" placeholder="Pesquisar por ID ou nome..." oninput="filterMissing()"/></div>
    <div id="missing-list"></div>
  </div>

  <div id="view-duplicates" class="view">
    <div class="stats-bar">
      <span>Para trocar:</span><span class="stats-count" id="dupe-total">0</span>
      <span style="color:var(--muted);font-size:12px">repetidos</span>
      <button class="export-btn" onclick="exportTradingList()">📋 Exportar lista</button>
    </div>
    <div id="dupe-list"></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="bnav-btn" id="bnav-dashboard" onclick="navTo('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Início
  </button>
  <button class="bnav-btn" id="bnav-browser" onclick="navTo('browser')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
    Cromos
  </button>
  <button class="bnav-btn" id="bnav-missing" onclick="navTo('missing')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/></svg>
    Em Falta
  </button>
  <button class="bnav-btn" id="bnav-duplicates" onclick="navTo('duplicates')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Repetidos
  </button>
</nav>

const GROUPS=['A','B','C','D','E','F','G','H','I','J','K','L'];

function buildStickers(){
  const s=[];
  ['FIFA World Cup 2026™','Official Emblem','Official Mascot','Official Slogan','Official Ball',
   'Host Country: Canada','Host Country: Mexico','Host Country: United States','Host Cities'
  ].forEach((name,i)=>s.push({id:`INT${i+1}`,section:'INT',group:'special',teamCode:'INT',teamName:'Introdução',teamFlag:'🌍',name,shortName:name,foil:i<5,num:i+1}));
  ['Uruguay 1930','Italy 1934','Italy 1938','Uruguay 1950','West Germany 1954',
   'Brazil 1958','Brazil 1962','England 1966','Brazil 1970','West Germany 1974','Argentina 1978'
  ].forEach((name,i)=>s.push({id:`MUS${i+1}`,section:'MUS',group:'special',teamCode:'MUS',teamName:'Museu FIFA',teamFlag:'🏆',name,shortName:name,foil:false,num:i+1}));
  TEAMS.forEach(t=>{
    for(let n=1;n<=20;n++){
      const sn=n===1?'Escudo':n===2?'Equipa':`Jogador ${n-2}`;
      s.push({id:`${t.code}${n}`,section:t.code,group:t.group,teamCode:t.code,teamName:t.name,teamFlag:t.flag,name:`${t.name} - ${sn}`,shortName:sn,foil:n===1,num:n});
    }
  });
  return s;
}
const STICKERS=buildStickers();
const BY_ID=Object.fromEntries(STICKERS.map(s=>[s.id,s]));

let curId=null,curName=null,state={},activeBG='A',expandedTeam=null;
const saveTimers={};
let missingCache=[];

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const isAuth=id=>sessionStorage.getItem('auth_'+id)==='1';
const setAuth=id=>sessionStorage.setItem('auth_'+id,'1');

function q(s){return JSON.stringify(s).replace(/"/g,'&quot;');}

let toastTmr;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),2200);
}

function openModal(title,sub,body){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-sub').textContent=sub;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
window.closeModal=()=>document.getElementById('modal-overlay').classList.add('hidden');
window.closeModalIfBg=e=>{if(e.target.id==='modal-overlay')closeModal();};

window.navTo=function(view){
  if(!curId&&view!=='home')return;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  ['dashboard','browser','missing','duplicates'].forEach(v=>{
    const b=document.getElementById('bnav-'+v);if(b)b.classList.toggle('active',v===view);
    const nb=document.getElementById('nb-'+v);if(nb)nb.classList.toggle('active',v===view);
  });
  if(view==='dashboard')renderDashboard();
  else if(view==='browser')renderBrowser();
  else if(view==='missing')renderMissing();
  else if(view==='duplicates')renderDuplicates();
};

window.switchCollection=function(){
  curId=null;curName=null;state={};expandedTeam=null;
  document.getElementById('nav-col-name').textContent='—';
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-home').classList.add('active');
  ['dashboard','browser','missing','duplicates'].forEach(v=>{
    const b=document.getElementById('bnav-'+v);if(b)b.classList.remove('active');
    const nb=document.getElementById('nb-'+v);if(nb)nb.classList.remove('active');
  });
  loadCollections();
};

async function loadCollections(){
  const loadEl=document.getElementById('collections-loading');
  const listEl=document.getElementById('collection-list');
  loadEl.style.display='flex';listEl.style.display='none';
  try{
    const snap=await getDocs(collection(db,COL));
    const cols=snap.docs.map(d=>({id:d.id,...d.data()}));
    loadEl.style.display='none';listEl.style.display='flex';
    listEl.innerHTML=!cols.length
      ?'<div style="text-align:center;color:var(--muted);padding:16px 0;font-size:14px">Ainda não tens coleções — cria a primeira abaixo 👇</div>'
      :cols.map(c=>{
          const owned=c.stickers?Object.values(c.stickers).filter(s=>s.o).length:0;
          const pct=Math.round(owned/980*100);
          return `<div class="collection-card" onclick="openCollection(${q(c.id)},${q(c.name)})">
            <div class="col-icon">⚽</div>
            <div class="col-info">
              <div class="col-name">${esc(c.name)}</div>
              <div class="col-progress">${owned} / 980 cromos (${pct}%)</div>
              <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="col-arrow">›</div>
          </div>`;
        }).join('');
  }catch(e){
    loadEl.innerHTML='<div style="color:var(--danger);padding:16px">Erro ao carregar coleções.</div>';
  }
}

window.openCollection=async function(colId,colName){
  if(isAuth(colId)){await enterCollection(colId,colName);return;}
  openModal('🔐 '+colName,'Introduz a password para aceder à coleção.',
    `<div class="form-group" style="margin-bottom:4px">
      <label class="form-label">Password</label>
      <input class="input" id="auth-pass" type="password" placeholder="Password"
        onkeydown="if(event.key==='Enter')doLogin(${q(colId)},${q(colName)})"/>
    </div>
    <div class="form-error hidden" id="auth-error">Password incorreta.</div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="doLogin(${q(colId)},${q(colName)})">Entrar</button>
    </div>`
  );
  setTimeout(()=>document.getElementById('auth-pass')?.focus(),80);
};

window.doLogin=async function(colId,colName){
  const passEl=document.getElementById('auth-pass');
  if(!passEl||!passEl.value)return;
  const hash=await sha256(passEl.value);
  const snap=await getDoc(doc(db,COL,colId));
  if(!snap.exists()||snap.data().passwordHash!==hash){
    document.getElementById('auth-error').classList.remove('hidden');
    return;
  }
  setAuth(colId);closeModal();
  await enterCollection(colId,colName);
};

async function enterCollection(colId,colName){
  curId=colId;curName=colName;
  document.getElementById('nav-col-name').textContent=colName;
  const snap=await getDoc(doc(db,COL,colId));
  state=snap.exists()?(snap.data().stickers||{}):{};
  navTo('dashboard');
}

window.doCreateCollection=async function(){
  const nameEl=document.getElementById('inp-name');
  const passEl=document.getElementById('inp-pass');
  const pass2El=document.getElementById('inp-pass2');
  const errEl=document.getElementById('create-error');
  const name=nameEl.value.trim(),pass=passEl.value,pass2=pass2El.value;
  errEl.classList.add('hidden');
  const showErr=msg=>{errEl.textContent=msg;errEl.classList.remove('hidden');};
  if(!name)return showErr('Introduz um nome para a coleção.');
  if(!pass)return showErr('Introduz uma password.');
  if(pass!==pass2)return showErr('As passwords não coincidem.');
  const colId=slugify(name);
  if((await getDoc(doc(db,COL,colId))).exists())return showErr('Já existe uma coleção com esse nome.');
  const passwordHash=await sha256(pass);
  const initialStickers=Object.fromEntries(STICKERS.map(s=>[s.id,{o:false,d:0}]));
  await setDoc(doc(db,COL,colId),{name,passwordHash,createdAt:serverTimestamp(),updatedAt:serverTimestamp(),stickers:initialStickers});
  setAuth(colId);
  nameEl.value='';passEl.value='';pass2El.value='';
  showToast('✅ Coleção criada!');
  state=initialStickers;curId=colId;curName=name;
  document.getElementById('nav-col-name').textContent=name;
  navTo('dashboard');
};

function renderDashboard(){
  document.getElementById('dash-title').textContent=curName;
  const vals=Object.values(state);
  const owned=vals.filter(s=>s.o).length;
  const pct=Math.round(owned/980*100);
  document.getElementById('donut-pct').textContent=pct+'%';
  document.getElementById('donut-arc').setAttribute('stroke-dashoffset',314-(pct/100)*314);
  document.getElementById('stat-owned').textContent=owned;
  document.getElementById('stat-missing').textContent=980-owned;
  document.getElementById('stat-dupes').textContent=vals.filter(s=>s.d>0).length;
  let complete=0;
  TEAMS.forEach(t=>{if(Array.from({length:20},(_,i)=>`${t.code}${i+1}`).every(id=>state[id]?.o))complete++;});
  document.getElementById('stat-teams').textContent=complete+'/48';
  document.getElementById('group-section').innerHTML=GROUPS.map(g=>{
    const teams=TEAMS.filter(t=>t.group===g);
    return `<div class="group-block"><div class="group-label">Grupo ${g}</div><div class="teams-row">${
      teams.map(t=>{
        const ids=Array.from({length:20},(_,i)=>`${t.code}${i+1}`);
        const to=ids.filter(id=>state[id]?.o).length;
        return `<div class="team-mini"><div class="team-mini-flag">${t.flag}</div><div class="team-mini-name">${t.name.split(' ')[0]}</div><div class="team-mini-bar"><div class="team-mini-fill" style="width:${to/20*100}%"></div></div></div>`;
      }).join('')
    }</div></div>`;
  }).join('');
}

function renderBrowser(){
  const tabs=[...GROUPS,'✦'];
  document.getElementById('browser-tabs').innerHTML=tabs.map(g=>
    `<button class="tab-btn${g===activeBG?' active':''}" onclick="setBG('${g}')">${g==='✦'?'Especiais':'Grupo '+g}</button>`
  ).join('');
  renderBrowserContent();
}

window.setBG=function(g){
  activeBG=g;expandedTeam=null;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',[...GROUPS,'✦'][i]===g));
  renderBrowserContent();
};

function renderBrowserContent(){
  const el=document.getElementById('browser-content');
  if(activeBG==='✦'){renderSpecial(el);return;}
  el.innerHTML=TEAMS.filter(t=>t.group===activeBG).map(t=>{
    const ids=Array.from({length:20},(_,i)=>`${t.code}${i+1}`);
    const to=ids.filter(id=>state[id]?.o).length;
    const exp=expandedTeam===t.code;
    return `<div class="team-section">
      <div class="team-header${exp?' expanded':''}" onclick="toggleTeam('${t.code}')">
        <div class="team-flag">${t.flag}</div>
        <div class="team-name">${esc(t.name)}</div>
        <div class="team-count${to===20?' complete':''}">${to}/20</div>
        <div class="team-chevron">⌄</div>
      </div>
      <div class="sticker-grid${exp?' visible':''}">${ids.map(id=>cellHtml(id)).join('')}</div>
    </div>`;
  }).join('');
}

function renderSpecial(el){
  const iIds=Array.from({length:9},(_,i)=>`INT${i+1}`);
  const mIds=Array.from({length:11},(_,i)=>`MUS${i+1}`);
  el.innerHTML=
    `<div class="special-section"><div class="special-title">🌍 Introdução (${iIds.filter(id=>state[id]?.o).length}/9)</div><div class="special-grid">${iIds.map(id=>cellHtml(id)).join('')}</div></div>
     <div class="special-section"><div class="special-title">🏆 Museu FIFA (${mIds.filter(id=>state[id]?.o).length}/11)</div><div class="special-grid">${mIds.map(id=>cellHtml(id)).join('')}</div></div>`;
}

function cellHtml(id){
  const s=BY_ID[id];
  const st=state[id]||{o:false,d:0};
  const cls=['sticker-cell',st.o?'owned':'',st.d>0?'has-dupes':'',s.foil?'foil':''].filter(Boolean).join(' ');
  const icon=st.o?'✓':(s.foil?'✦':'');
  const badge=st.d>0?`<div class="dupe-badge">+${st.d}</div>`:'';
  return `<div class="${cls}" id="sc-${id}" onclick="tapSticker('${id}')" oncontextmenu="longTap(event,'${id}')" title="${esc(s.name)}">${badge}<div class="sticker-num">${id}</div><div class="sticker-icon">${icon}</div></div>`;
}

window.toggleTeam=function(code){
  expandedTeam=expandedTeam===code?null:code;
  renderBrowserContent();
};

window.tapSticker=function(id){
  const st=state[id]||{o:false,d:0};
  st.o=!st.o;state[id]=st;
  updateCell(id);saveSticker(id);
  showToast(st.o?'✅ Cromo marcado!':'↩ Removido');
};

window.longTap=function(e,id){
  e.preventDefault();openDupeModal(id);
};

function openDupeModal(id){
  const s=BY_ID[id];
  const st=state[id]||{o:false,d:0};
  openModal(id,s.name,
    `<div class="modal-counter">
    <button class="counter-btn" onclick="adjustDupe('${id}',-1)">−</button>
    <div class="counter-val" id="mc-val">${st.d}</div>
    <button class="counter-btn" onclick="adjustDupe('${id}',1)">+</button>
    </div><div style="text-align:center;font-size:12px;color:var(--muted)">Número de repetidos para trocar</div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Fechar</button></div>`
  );
}

window.adjustDupe=function(id,delta){
  const st=state[id]||{o:false,d:0};
  st.d=Math.max(0,(st.d||0)+delta);state[id]=st;
  const v=document.getElementById('mc-val');if(v)v.textContent=st.d;
  updateCell(id);saveSticker(id);
};

function updateCell(id){
  const cell=document.getElementById('sc-'+id);if(!cell)return;
  const s=BY_ID[id];const st=state[id]||{o:false,d:0};
  cell.className=['sticker-cell',st.o?'owned':'',st.d>0?'has-dupes':'',s.foil?'foil':''].filter(Boolean).join(' ');
  const icon=st.o?'✓':(s.foil?'✦':'');
  const badge=st.d>0?`<div class="dupe-badge">+${st.d}</div>`:'';
  cell.innerHTML=badge+`<div class="sticker-num">${id}</div><div class="sticker-icon">${icon}</div>`;
}

async function saveSticker(id){
  clearTimeout(saveTimers[id]);
  saveTimers[id]=setTimeout(async()=>{
    try{await updateDoc(doc(db,COL,curId),{['stickers.'+id]:state[id],updatedAt:serverTimestamp()});}
    catch(e){console.error('Save failed:',e);}
  },400);
}

function renderMissing(){
  missingCache=STICKERS.filter(s=>!state[s.id]?.o);
  document.getElementById('missing-count').textContent=missingCache.length;
  document.getElementById('missing-search').value='';
  filterMissing();
}

window.filterMissing=function(){
  const q2=(document.getElementById('missing-search').value||'').toLowerCase();
  const list=q2?missingCache.filter(s=>s.id.toLowerCase().includes(q2)||s.name.toLowerCase().includes(q2)):missingCache;
  const el=document.getElementById('missing-list');
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">${missingCache.length?'🔍':'🎉'}</div><div class="empty-text">${missingCache.length?'Nenhum resultado':'Coleção completa!'}</div><div class="empty-sub">${missingCache.length?'Tenta outra pesquisa':'Tens todos os 980 cromos!'}</div></div>`;
    return;
  }
  el.innerHTML=groupByTeam(list).map(({teamName,teamFlag,items})=>
    `<div class="list-group"><div class="list-group-header"><span class="lg-flag">${teamFlag}</span><span class="lg-name">${esc(teamName)}</span><span class="lg-count">${items.length} em falta</span></div>`+
    items.map(s=>`<div class="list-item"><span class="li-id">${s.id}</span><span class="li-name">${esc(s.shortName)}</span>${s.foil?'<span class="li-foil">✦ Foil</span>':''}<button class="li-btn" onclick="markOwned('${s.id}')">✓ Tenho</button></div>`).join('')+'</div>'
  ).join('');
};

window.markOwned=function(id){
  const st=state[id]||{o:false,d:0};st.o=true;state[id]=st;
  saveSticker(id);renderMissing();showToast('✅ Cromo marcado!');
};

function renderDuplicates(){
  const dupes=STICKERS.filter(s=>(state[s.id]?.d||0)>0);
  document.getElementById('dupe-total').textContent=dupes.reduce((sum,s)=>sum+(state[s.id]?.d||0),0);
  const el=document.getElementById('dupe-list');
  if(!dupes.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">✨</div><div class="empty-text">Sem repetidos por agora</div><div class="empty-sub">Quando tiveres cromos repetidos aparecem aqui para facilitar trocas</div></div>';
    return;
  }
  el.innerHTML=groupByTeam(dupes).map(({teamName,teamFlag,items})=>
    `<div class="list-group"><div class="list-group-header"><span class="lg-flag">${teamFlag}</span><span class="lg-name">${esc(teamName)}</span></div>`+
    items.map(s=>`<div class="list-item"><span class="li-id">${s.id}</span><span class="li-name">${esc(s.shortName)}</span>${s.foil?'<span class="li-foil">✦ Foil</span>':''}<div class="dupe-controls"><button class="dupe-btn" onclick="changeDupe('${s.id}',-1)">−</button><span class="dupe-count">${state[s.id]?.d||0}</span><button class="dupe-btn" onclick="changeDupe('${s.id}',1)">+</button></div></div>`).join('')+'</div>'
  ).join('');
}

window.changeDupe=function(id,delta){
  const st=state[id]||{o:false,d:0};st.d=Math.max(0,(st.d||0)+delta);state[id]=st;
  saveSticker(id);renderDuplicates();
};

window.exportTradingList=function(){
  const dupes=STICKERS.filter(s=>(state[s.id]?.d||0)>0);
  if(!dupes.length){showToast('Não tens repetidos!');return;}
  const lines=['Panini FIFA World Cup 2026™ — Repetidos para troca','='.repeat(44),''];
  groupByTeam(dupes).forEach(({teamName,items})=>{
    lines.push(teamName+':');
    items.forEach(s=>lines.push('  '+s.id+' — '+s.shortName+' (x'+(state[s.id]?.d)+')'));
    lines.push('');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));
  a.download='repetidos-panini-wc2026.txt';a.click();
};

function groupByTeam(stickers){
  const map=new Map();
  stickers.forEach(s=>{
    if(!map.has(s.teamCode))map.set(s.teamCode,{teamCode:s.teamCode,teamName:s.teamName,teamFlag:s.teamFlag,items:[]});
    map.get(s.teamCode).items.push(s);
  });
  return Array.from(map.values());
}

function slugify(name){
  return name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').substring(0,40);
}

function esc(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let lpTimer,lpId;
document.addEventListener('touchstart',e=>{
  const cell=e.target.closest('.sticker-cell');if(!cell)return;
  lpId=cell.id.replace('sc-','');
  lpTimer=setTimeout(()=>{if(lpId)openDupeModal(lpId);},550);
},false);
document.addEventListener('touchend',()=>{clearTimeout(lpTimer);lpId=null;},false);
document.addEventListener('touchmove',()=>{clearTimeout(lpTimer);lpId=null;},{passive:true});

loadCollections();
</script>
